name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.EC2_APP_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Copying .env from .env.example (if .env does not exist)..."
            [ -f .env ] || cp .env.example .env

            echo "==> Updating .env values..."
            sed -i 's/^APP_ENV=.*/APP_ENV=production/' .env
            sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env
            sed -i 's|^APP_URL=.*|APP_URL=http://${{ secrets.EC2_HOST }}|' .env

            echo "==> Building Docker images..."
            docker compose build --pull

            echo "==> Installing PHP dependencies..."
            docker compose run --no-deps --rm -T workspace composer install --no-dev --optimize-autoloader

            echo "==> Starting containers..."
            docker compose up -d --remove-orphans

            echo "==> Waiting for workspace container to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format "{{.State.Health.Status}}" cloudy_workspace 2>/dev/null || echo "not_found")
              if [ "$STATUS" = "healthy" ]; then
                echo "  workspace is healthy"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "ERROR: workspace did not become healthy within 300s" >&2
                exit 1
              fi
              echo "  still waiting... ($STATUS)"
              sleep 10
            done

            echo "==> Installing Node dependencies & building assets..."
            docker compose exec -T workspace npm ci
            docker compose exec -T workspace npm run build

            echo "==> Running migrations..."
            docker compose exec -T workspace php artisan migrate --force

            echo "==> Clearing & caching config..."
            docker compose exec -T workspace php artisan config:cache
            docker compose exec -T workspace php artisan route:cache
            docker compose exec -T workspace php artisan view:cache

            echo "==> Done!"
