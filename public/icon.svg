<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <!-- Background gradient: dark navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0c1d50"/>
    </linearGradient>
    <!-- Cloud gradient: blue → cyan -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="36" fill="url(#bgGrad)"/>

  <!-- Subtle orange glow top-right -->
  <circle cx="170" cy="30" r="55" fill="#F97316" opacity="0.08"/>
  <!-- Subtle blue glow bottom-left -->
  <circle cx="30" cy="175" r="50" fill="#3B82F6" opacity="0.10"/>

  <!-- Cloud shape (centered, slightly below middle) -->
  <g filter="url(#shadow)" transform="translate(100, 115)">
    <!-- Main cloud body -->
    <path d="M-46,18 Q-46,-6 -26,-6 Q-24,-28 2,-28 Q18,-42 36,-28 Q54,-28 54,-10 Q66,-10 66,6 Q66,18 54,18 Z"
          fill="url(#cloudGrad)"/>
  </g>

  <!-- Graduation cap on top of cloud -->
  <g transform="translate(100, 72)">
    <!-- Board (mortarboard top) -->
    <polygon points="0,-18 32,0 0,18 -32,0" fill="#F97316"/>
    <!-- Cap crown -->
    <rect x="-14" y="0" width="28" height="16" rx="3" fill="#FB923C"/>
    <!-- Tassel string -->
    <line x1="32" y1="0" x2="32" y2="20" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="32" cy="22" r="3.5" fill="#FCD34D"/>
  </g>

  <!-- "CL" initials inside cloud -->
  <text x="100" y="128"
        font-family="'Instrument Sans', 'Arial', sans-serif"
        font-size="22"
        font-weight="900"
        fill="#0c1d50"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="2">CL</text>
</svg>
