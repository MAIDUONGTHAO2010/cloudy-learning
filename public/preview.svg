<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <!-- Dark navy background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a4e"/>
      <stop offset="50%" style="stop-color:#0f2460"/>
      <stop offset="100%" style="stop-color:#0c1d50"/>
    </linearGradient>
    <!-- Cloud / logo gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" style="stop-color:#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="roundedCard">
      <rect x="470" y="60" width="290" height="290" rx="20"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Glow blobs -->
  <circle cx="720" cy="40"  r="130" fill="#F97316" opacity="0.07"/>
  <circle cx="80"  cy="360" r="110" fill="#3B82F6" opacity="0.09"/>
  <circle cx="400" cy="200" r="200" fill="#0f2460" opacity="0.20"/>

  <!-- ══════════════════════════════════════════
       LEFT PANEL — Logo + Title + Features
  ══════════════════════════════════════════ -->

  <!-- Logo badge -->
  <g transform="translate(58, 62)">
    <rect width="52" height="52" rx="14" fill="url(#cloudGrad)" filter="url(#shadow)"/>
    <!-- mini cloud -->
    <path d="M10,36 Q10,26 18,26 Q19,18 28,18 Q34,13 40,18 Q48,18 48,26 Q52,26 52,32 Q52,36 46,36 Z"
          fill="white" opacity="0.95"/>
    <!-- mini mortarboard -->
    <polygon points="28,14 40,20 28,26 16,20" fill="#F97316"/>
    <rect x="21" y="20" width="14" height="7" rx="2" fill="#FB923C"/>
  </g>

  <!-- Brand name -->
  <text x="122" y="82"
        font-family="'Instrument Sans','Arial',sans-serif"
        font-size="15" font-weight="700" fill="#93C5FD" letter-spacing="1">
    CLOUDY LEARNING
  </text>
  <text x="122" y="100"
        font-family="'Instrument Sans','Arial',sans-serif"
        font-size="11" font-weight="400" fill="#64748B" letter-spacing="0.5">
    Smart Online Learning Platform
  </text>

  <!-- Main headline -->
  <text x="58" y="162"
        font-family="'Instrument Sans','Arial',sans-serif"
        font-size="34" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">
    Smart Study
  </text>
  <text x="58" y="204"
        font-family="'Instrument Sans','Arial',sans-serif"
        font-size="34" font-weight="900" fill="#F97316" letter-spacing="-0.5">
    Where Knowledge
  </text>
  <text x="58" y="246"
        font-family="'Instrument Sans','Arial',sans-serif"
        font-size="34" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">
    Meets the Web
  </text>

  <!-- Divider -->
  <rect x="58" y="264" width="44" height="3" rx="2" fill="#F97316"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="58" y="284" width="116" height="28" rx="14"
        fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="116" y="302"
        font-family="'Arial',sans-serif" font-size="12" fill="#BFDBFE"
        text-anchor="middle">🎓 Expert Courses</text>

  <!-- Pill 2 -->
  <rect x="184" y="284" width="106" height="28" rx="14"
        fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="237" y="302"
        font-family="'Arial',sans-serif" font-size="12" fill="#BFDBFE"
        text-anchor="middle">📊 Progress Track</text>

  <!-- Pill 3 -->
  <rect x="58" y="322" width="96" height="28" rx="14"
        fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="106" y="340"
        font-family="'Arial',sans-serif" font-size="12" fill="#BFDBFE"
        text-anchor="middle">⭐ 4.9 Rating</text>

  <!-- Pill 4 -->
  <rect x="164" y="322" width="126" height="28" rx="14"
        fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="227" y="340"
        font-family="'Arial',sans-serif" font-size="12" fill="#BFDBFE"
        text-anchor="middle">🌐 Laravel + Vue 3</text>

  <!-- ══════════════════════════════════════════
       RIGHT PANEL — Mockup course card
  ══════════════════════════════════════════ -->

  <!-- Card outer glow -->
  <rect x="468" y="58" width="294" height="284" rx="22"
        fill="none" stroke="#3B82F6" stroke-opacity="0.25" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Card background -->
  <rect x="470" y="60" width="290" height="282" rx="20" fill="url(#cardGrad)"
        stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Card top: colored header -->
  <rect x="470" y="60" width="290" height="110" rx="20" fill="#0f2460"/>
  <rect x="470" y="130" width="290" height="40" fill="#0f2460"/>

  <!-- Header text -->
  <text x="490" y="90"
        font-family="'Arial',sans-serif" font-size="11" font-weight="600"
        fill="#93C5FD" letter-spacing="1">FEATURED COURSE</text>
  <text x="490" y="114"
        font-family="'Arial',sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">
    Full-Stack Web Dev
  </text>
  <text x="490" y="133"
        font-family="'Arial',sans-serif" font-size="11" fill="#64748B">
    by Expert Instructor
  </text>

  <!-- Star rating row -->
  <text x="490" y="160"
        font-family="'Arial',sans-serif" font-size="14" fill="#FBBF24">★★★★★</text>
  <text x="588" y="160"
        font-family="'Arial',sans-serif" font-size="12" fill="#94A3B8">4.9 (1,240)</text>

  <!-- Progress bar -->
  <text x="490" y="186"
        font-family="'Arial',sans-serif" font-size="10" fill="#64748B">Course progress</text>
  <rect x="490" y="193" width="230" height="6" rx="3" fill="#1e3a6e"/>
  <rect x="490" y="193" width="161" height="6" rx="3" fill="url(#cloudGrad)"/>
  <text x="726" y="200"
        font-family="'Arial',sans-serif" font-size="9" fill="#93C5FD">70%</text>

  <!-- Lesson list items -->
  <g transform="translate(490, 218)">
    <!-- Item 1 -->
    <circle cx="8" cy="8" r="8" fill="#F97316" opacity="0.9"/>
    <text x="8" y="12" font-family="'Arial'" font-size="9" fill="white" text-anchor="middle">✓</text>
    <text x="24" y="12" font-family="'Arial'" font-size="11" fill="#CBD5E1">Introduction to HTML &amp; CSS</text>

    <!-- Item 2 -->
    <circle cx="8" cy="32" r="8" fill="#F97316" opacity="0.9"/>
    <text x="8" y="36" font-family="'Arial'" font-size="9" fill="white" text-anchor="middle">✓</text>
    <text x="24" y="36" font-family="'Arial'" font-size="11" fill="#CBD5E1">JavaScript Fundamentals</text>

    <!-- Item 3 -->
    <circle cx="8" cy="56" r="8" fill="#1e3a6e"/>
    <text x="8" y="60" font-family="'Arial'" font-size="9" fill="#64748B" text-anchor="middle">3</text>
    <text x="24" y="60" font-family="'Arial'" font-size="11" fill="#64748B">Vue 3 + Laravel API</text>

    <!-- Item 4 -->
    <circle cx="8" cy="80" r="8" fill="#1e3a6e"/>
    <text x="8" y="84" font-family="'Arial'" font-size="9" fill="#64748B" text-anchor="middle">4</text>
    <text x="24" y="84" font-family="'Arial'" font-size="11" fill="#64748B">Deployment &amp; CI/CD</text>
  </g>

  <!-- CTA button at bottom of card -->
  <rect x="490" y="314" width="230" height="20" rx="10" fill="#F97316"/>
  <text x="605" y="328"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="0.5">Continue Learning →</text>

  <!-- ── Bottom stats bar ── -->
  <rect x="0" y="370" width="800" height="30" fill="#ffffff" fill-opacity="0.04"/>
  <line x1="0" y1="370" x2="800" y2="370" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="130" y="390" font-family="'Arial'" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">200+</text>
  <text x="130" y="390" font-family="'Arial'" font-size="12" fill="#FFFFFF" text-anchor="middle" dx="28">Courses</text>

  <line x1="260" y1="376" x2="260" y2="394" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Stat 2 -->
  <text x="390" y="390" font-family="'Arial'" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">50+</text>
  <text x="390" y="390" font-family="'Arial'" font-size="12" fill="#FFFFFF" text-anchor="middle" dx="38">Instructors</text>

  <line x1="540" y1="376" x2="540" y2="394" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Stat 3 -->
  <text x="670" y="390" font-family="'Arial'" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">10k+</text>
  <text x="670" y="390" font-family="'Arial'" font-size="12" fill="#FFFFFF" text-anchor="middle" dx="38">Students</text>
</svg>
