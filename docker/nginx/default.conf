# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name learning.duongthao.click;

    # Allow Let's Encrypt ACME challenge over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name learning.duongthao.click;
    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/learning.duongthao.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learning.duongthao.click/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Proxy S3/MinIO uploads through nginx so the browser never needs a
    # direct cross-origin connection to MinIO (port 9000).  Nginx handles
    # the CORS preflight here and forwards to the internal MinIO service.
    # The Host header is kept as "minio:9000" so AWS SigV4 signatures that
    # were created against the internal endpoint remain valid.
    #
    # NOTE: CORS add_header directives appear at BOTH the location level and
    # inside the if ($request_method = 'OPTIONS') block.  This is required
    # because nginx's inheritance rule says location-level add_header
    # directives are NOT applied to responses generated by an if block that
    # defines its own add_header directives ("if is evil" issue).  Keeping
    # them at the location level covers PUT/GET/HEAD responses; repeating
    # them inside the if block covers the OPTIONS preflight 204 response.
    location ^~ /minio-proxy/ {
        # CORS headers applied to every response, including the 204 preflight.
        add_header 'Access-Control-Allow-Origin'  '*'                                      always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*'                                      always;
        add_header 'Access-Control-Expose-Headers' 'ETag'                                 always;
        add_header 'Access-Control-Max-Age'        '3000'                                 always;

        # Return 204 for OPTIONS preflight without proxying to MinIO.
        # CORS add_header directives must be repeated here: when an if block
        # contains its own add_header, nginx's inheritance rules mean the
        # location-level headers are NOT applied to the if-block response.
        # Duplicating them here ensures the preflight 204 always carries the
        # required Access-Control-* headers.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'   '*'                                      always;
            add_header 'Access-Control-Allow-Methods'  'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'  '*'                                      always;
            add_header 'Access-Control-Expose-Headers' 'ETag'                                  always;
            add_header 'Access-Control-Max-Age'        '3000'                                  always;
            return 204;
        }

        # Strip any CORS headers that MinIO itself returns so that nginx's
        # headers above are the only ones the browser sees.  Duplicate
        # Access-Control-Allow-Origin values cause browsers to fail CORS.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        client_max_body_size    0;
        proxy_pass              http://minio:9000/;
        proxy_set_header        Host              minio:9000;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_connect_timeout   60s;
        proxy_send_timeout      600s;
        proxy_read_timeout      600s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass workspace:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    120s;
        fastcgi_read_timeout    120s;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         16 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
