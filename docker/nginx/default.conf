server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Proxy S3/MinIO uploads through nginx so the browser never needs a
    # direct cross-origin connection to MinIO (port 9000).  Nginx handles
    # the CORS preflight here and forwards to the internal MinIO service.
    # The Host header is kept as "minio:9000" so AWS SigV4 signatures that
    # were created against the internal endpoint remain valid.
    #
    # NOTE: All add_header directives are intentionally placed at the
    # location level (outside the if block).  Placing add_header inside an
    # nginx if block causes the location-level headers to be silently
    # ignored for non-matching requests ("if is evil" issue), which would
    # prevent CORS headers from being sent on PUT/GET responses.
    location ^~ /minio-proxy/ {
        # CORS headers applied to every response, including the 204 preflight.
        add_header 'Access-Control-Allow-Origin'  '*'                                      always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*'                                      always;
        add_header 'Access-Control-Expose-Headers' 'ETag'                                 always;
        add_header 'Access-Control-Max-Age'        '3000'                                 always;

        # Return 204 for OPTIONS preflight without proxying to MinIO.
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Strip any CORS headers that MinIO itself returns so that nginx's
        # headers above are the only ones the browser sees.  Duplicate
        # Access-Control-Allow-Origin values cause browsers to fail CORS.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        client_max_body_size    0;
        proxy_pass              http://minio:9000/;
        proxy_set_header        Host              minio:9000;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_connect_timeout   60s;
        proxy_send_timeout      600s;
        proxy_read_timeout      600s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass workspace:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    120s;
        fastcgi_read_timeout    120s;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         16 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
