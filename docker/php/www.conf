[www]
user = www-data
group = www-data

; Listen on all interfaces so nginx can reach PHP-FPM from another container
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Catch PHP errors in the FPM log rather than silently dropping requests
php_flag[display_errors] = off
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
