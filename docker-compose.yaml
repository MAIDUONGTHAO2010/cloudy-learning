services:
  workspace:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: cloudy_workspace
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - minio
    networks:
      - cloudy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  nginx:
    image: nginx:alpine
    container_name: cloudy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      workspace:
        condition: service_healthy
    networks:
      - cloudy

  postgres:
    image: postgres:16-alpine
    container_name: cloudy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cloudy}
      POSTGRES_USER: ${DB_USERNAME:-cloudy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cloudy

  minio:
    image: minio/minio:latest
    container_name: cloudy_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cloudy

  minio_init:
    image: minio/mc:latest
    container_name: cloudy_minio_init
    depends_on:
      - minio
    volumes:
      - ./docker/minio/cors.json:/tmp/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/${AWS_BUCKET:-cloudy-learning} || true;
      mc anonymous set download local/${AWS_BUCKET:-cloudy-learning} || true;
      mc cors set local/${AWS_BUCKET:-cloudy-learning} /tmp/cors.json || true;
      exit 0;
      "
    networks:
      - cloudy

  adminer:
    image: adminer:latest
    container_name: cloudy_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - cloudy

networks:
  cloudy:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
